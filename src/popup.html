<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
  <title>X-Purge</title>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="icons/icon48.png" alt="X-Purge Logo" class="logo">
      <h2>X-Purge</h2>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="purge-view">Purge Tweets</button>
      <button class="tab-btn" data-tab="unfollow-view">Unfollow</button>
      <button class="tab-btn" data-tab="dislike-view">Dislike</button>
      <button class="tab-btn" data-tab="bookmark-view">Unbookmark</button>
    </div>

    <div id="purge-view" class="tab-content active">
      <div class="form-group">
        <label for="count">Tweets to Delete/Undo:</label>
        <input type="number" id="count" value="10" min="1">
      </div>
      <div class="form-group flex-row">
        <input type="checkbox" id="forever" class="checkbox-input">
        <label for="forever" class="checkbox-label">Forever (Delete All)</label>
      </div>
      <div class="form-group">
        <label for="delay">Delay (ms):</label>
        <input type="number" id="delay" value="2000" min="500" step="500">
      </div>
      <div class="form-group">
        <label>Include Options:</label>
        <div class="flex-row">
          <input type="checkbox" id="removeReposts" checked class="checkbox-input">
          <label for="removeReposts" class="checkbox-label">Undo Reposts</label>
        </div>
        <div class="flex-row">
          <input type="checkbox" id="removeLikes" checked class="checkbox-input">
          <label for="removeLikes" class="checkbox-label">Remove Likes</label>
        </div>
      </div>
      <div class="form-group">
        <label for="direction">Direction:</label>
        <select id="direction">
          <option value="latest">Latest First</option>
          <option value="oldest">Oldest First (Scroll)</option>
        </select>
      </div>
      <div class="form-group">
        <label for="mode">Mode:</label>
        <select id="mode">
          <option value="background">Background Tab</option>
          <option value="foreground" selected>Foreground Tab</option>
        </select>
      </div>
      <button id="startPurgeBtn" class="action-btn">Start Deletion</button>
    </div>

    <div id="unfollow-view" class="tab-content">
      <div class="form-group">
        <label for="unfollowCount">Accounts to Unfollow:</label>
        <input type="number" id="unfollowCount" value="10" min="1">
      </div>
      <div class="form-group flex-row">
        <input type="checkbox" id="unfollowForever" class="checkbox-input">
        <label for="unfollowForever" class="checkbox-label">Forever (All)</label>
      </div>
      <div class="form-group">
        <label for="unfollowDelay">Delay (ms):</label>
        <input type="number" id="unfollowDelay" value="2000" min="500" step="500">
      </div>
      <div class="form-group flex-row">
        <input type="checkbox" id="includeBlock" class="checkbox-input">
        <label for="includeBlock" class="checkbox-label">Include Block</label>
      </div>
      <div class="form-group">
        <label for="unfollowMode">Mode:</label>
        <select id="unfollowMode">
          <option value="background">Background Tab</option>
          <option value="foreground" selected>Foreground Tab</option>
        </select>
      </div>
      <button id="startUnfollowBtn" class="action-btn unfollow">Start Unfollowing</button>
    </div>

    <div id="dislike-view" class="tab-content">
      <div class="form-group">
        <label for="dislikeCount">Likes to Remove:</label>
        <input type="number" id="dislikeCount" value="10" min="1">
      </div>
      <div class="form-group flex-row">
        <input type="checkbox" id="dislikeForever" class="checkbox-input">
        <label for="dislikeForever" class="checkbox-label">Forever (All)</label>
      </div>
      <div class="form-group">
        <label for="dislikeDelay">Delay (ms):</label>
        <input type="number" id="dislikeDelay" value="2000" min="500" step="500">
      </div>
      <div class="form-group">
        <label for="dislikeMode">Mode:</label>
        <select id="dislikeMode">
          <option value="background">Background Tab</option>
          <option value="foreground" selected>Foreground Tab</option>
        </select>
      </div>
      <button id="startDislikeBtn" class="action-btn dislike">Start Disliking</button>
    </div>
    <div id="bookmark-view" class="tab-content">
      <div class="form-group">
        <label for="bookmarkCount">Bookmarks to Remove:</label>
        <input type="number" id="bookmarkCount" value="10" min="1">
      </div>
      <div class="form-group flex-row">
        <input type="checkbox" id="bookmarkForever" class="checkbox-input">
        <label for="bookmarkForever" class="checkbox-label">Forever (All)</label>
      </div>
      <div class="form-group">
        <label for="bookmarkDelay">Delay (ms):</label>
        <input type="number" id="bookmarkDelay" value="2000" min="500" step="500">
      </div>
      <div class="form-group">
        <label for="bookmarkMode">Mode:</label>
        <select id="bookmarkMode">
          <option value="background">Background Tab</option>
          <option value="foreground" selected>Foreground Tab</option>
        </select>
      </div>
      <button id="startBookmarkBtn" class="action-btn bookmark">Start Unbookmarking</button>
    </div>

    <div id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
